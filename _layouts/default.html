{% capture root_url %}{{ site.root | strip_slash }}{% endcapture %}
{% include head.html %}

<body>
  <div id="logo-container">
    <a id="lrg-mark" href="https://amarahub.org/">
      <svg viewBox="0 0 512 512" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" fill="#0B3255"/>
        <text x="256" y="332" text-anchor="middle" font-family="'League Spartan', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="220" fill="#FFFFFF">AH</text>
      </svg>
    </a>
  </div>
  <header id="banner">{% include header.html %}</header>
  <div class="header-hamburger">
    <button class="cmn-toggle-switch cmn-toggle-switch__htx">
      <span>toggle menu</span>
    </button>
  </div>
  <div id="main">
    <div id="content">

      {{ content | expand_urls: root_url }}

    </div>

    <aside class="related-articles"></aside>

  </div>
  <footer id="main_footer">{% include footer.html %}</footer>
  {% include end_of_body_scripts.html %}
</body>
</html>
