{% assign cats = include.categories | default: page.categories %}
{% if cats and cats != empty %}
<span class="categories">
  {% for cat in cats %}
    {% assign slug = cat | replace: '_','-' | replace: ' ','-' | downcase %}
    <a class="category" href="{{ '/blog/categories/' | append: slug | append: '/' | relative_url }}">{{ cat }}</a>{% unless forloop.last %}, {% endunless %}
  {% endfor %}
</span>
{% endif %}
