{% assign cats = include.categories | default: page.categories %}
{% if cats and cats != empty %}
<span class="categories">
  {% for cat in cats %}
    {% assign slug = cat | slugify %}
    <a class="category" href="{{ '/categories/' | relative_url }}#{{ slug }}">{{ cat }}</a>{% unless forloop.last %}, {% endunless %}
  {% endfor %}
</span>
{% endif %}
